name: Read-only Avito smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: avito-smoke
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - name: Run read-only production smoke
        env:
          Client_id: ${{ secrets.AVITO_CLIENT_ID }}
          Client_secret: ${{ secrets.AVITO_CLIENT_SECRET }}
          Profile_id: ${{ secrets.AVITO_PROFILE_ID }}
          AVITO_MCP_SMOKE_ALLOW_PRODUCTION: 'true'
          AVITO_TOKEN_FILE: ${{ runner.temp }}/avito-smoke-token.json
        run: npm run smoke
